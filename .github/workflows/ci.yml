# =============================================================================
# GreenOps Auto-Remediador — Pipeline de CI
# =============================================================================
# Executa lint, testes e análise de cobertura em Python 3.11 e 3.12.
#
# Triggers:
#   - push para main
#   - pull requests para main
#
# Jobs:
#   lint    — flake8 (estilo PEP8) em Python 3.12
#   test    — pytest + coverage em Python 3.11 e 3.12 (matrix)
#   summary — comentário de cobertura no PR (apenas pull_request)
# =============================================================================

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Cancela runs anteriores do mesmo PR/branch para economizar minutos
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Permissões mínimas necessárias
permissions:
  contents: read
  pull-requests: write   # necessário para comentar cobertura no PR

# =============================================================================
# Variáveis de ambiente globais
# =============================================================================
env:
  # Credenciais AWS falsas para moto (mock AWS) — nunca usam AWS real
  AWS_DEFAULT_REGION: us-east-1
  AWS_ACCESS_KEY_ID: testing
  AWS_SECRET_ACCESS_KEY: testing
  AWS_SECURITY_TOKEN: testing
  AWS_SESSION_TOKEN: testing
  # Variáveis de ambiente do GreenOps para testes
  GREENOPS_ENVIRONMENT: dev
  GREENOPS_DRY_RUN: "true"
  FINDINGS_TTL_DAYS: "90"
  FINDINGS_TABLE: greenops-findings-test
  ENVIRONMENT: dev

jobs:
  # ===========================================================================
  # Job 1: Lint — flake8 em Python 3.12
  # Roda apenas uma vez (não precisa de matrix) para feedback rápido.
  # ===========================================================================
  lint:
    name: Lint (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache de pip baseado no hash dos arquivos de dependências
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.12-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.12-
            ${{ runner.os }}-pip-

      - name: Instalar dependências de lint
        run: |
          python -m pip install --upgrade pip
          pip install flake8>=7.0.0

      - name: Executar flake8
        run: |
          flake8 src/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503 \
            --exclude=__pycache__,.venv \
            --statistics \
            --count
        # E203: whitespace before ':' (conflito com black)
        # W503: line break before binary operator (conflito com black)

  # ===========================================================================
  # Job 2: Testes — pytest + coverage em Python 3.11 e 3.12
  # ===========================================================================
  test:
    name: Testes (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      # Continua rodando a outra versão mesmo se uma falhar
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          # Habilita cache nativo do setup-python para o pip
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      # Cache adicional para moto (pacote grande, ~50MB)
      - name: Cache pip (moto e dependências pesadas)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Verificar versões instaladas
        run: |
          python --version
          pip show pytest pytest-cov moto boto3 | grep -E "^(Name|Version):"

      - name: Executar testes unitários com cobertura
        run: |
          pytest tests/unit/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage-${{ matrix.python-version }}.xml \
            --cov-report=html:htmlcov-${{ matrix.python-version }} \
            --cov-fail-under=70 \
            -v \
            --tb=short \
            --pythonpath=src
        # --cov-fail-under=70: falha se cobertura < 70%
        # --pythonpath=src: adiciona src/ ao PYTHONPATH para imports relativos

      - name: Upload relatório de cobertura XML
        # Sempre faz upload, mesmo se os testes falharem (para diagnóstico)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-py${{ matrix.python-version }}
          path: coverage-${{ matrix.python-version }}.xml
          retention-days: 30

      - name: Upload relatório de cobertura HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-py${{ matrix.python-version }}
          path: htmlcov-${{ matrix.python-version }}/
          retention-days: 30

      # Exibe resumo de cobertura no log do GitHub Actions
      - name: Resumo de cobertura no Step Summary
        if: always()
        run: |
          echo "## 📊 Cobertura de Testes — Python ${{ matrix.python-version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          python -m coverage report --rcfile=/dev/null \
            --data-file=.coverage \
            --include="src/*" \
            --skip-empty 2>/dev/null || echo "Relatório de cobertura não disponível"
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Job 3: Validação do template CloudFormation
  # Verifica sintaxe YAML sem precisar de credenciais AWS reais.
  # ===========================================================================
  validate-cfn:
    name: Validar CloudFormation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar cfn-lint
        run: pip install cfn-lint

      - name: Lint do template CloudFormation
        # cfn-lint verifica sintaxe e boas práticas sem chamar a AWS
        run: |
          cfn-lint infrastructure/cloudformation/main.yaml \
            --ignore-checks W3002 \
            --format parseable
        # W3002: propriedades que requerem substituição (ZipFile placeholder)
        continue-on-error: true
        # continue-on-error: warnings do cfn-lint não bloqueiam o CI
        # (o template usa ZipFile placeholder que será substituído no deploy)

      - name: Verificar sintaxe YAML
        run: |
          python -c "
          import yaml, sys
          with open('infrastructure/cloudformation/main.yaml') as f:
              try:
                  yaml.safe_load(f)
                  print('✅ YAML válido')
              except yaml.YAMLError as e:
                  print(f'❌ YAML inválido: {e}')
                  sys.exit(1)
          "

  # ===========================================================================
  # Job 4: Status check — garante que lint e testes passaram
  # Usado como required check no branch protection.
  # ===========================================================================
  ci-success:
    name: CI passou
    runs-on: ubuntu-latest
    needs: [lint, test, validate-cfn]
    if: always()

    steps:
      - name: Verificar status dos jobs
        run: |
          echo "lint:         ${{ needs.lint.result }}"
          echo "test:         ${{ needs.test.result }}"
          echo "validate-cfn: ${{ needs.validate-cfn.result }}"

          # Falha se lint ou test falharam (validate-cfn é continue-on-error)
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "❌ Lint falhou"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "❌ Testes falharam"
            exit 1
          fi
          echo "✅ CI passou em todos os checks obrigatórios"
